version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgres://mychat:mychat@postgres:5432/mychat
      DB_SSL: "false"
      NODE_ENV: production
      ALLOWED_ORIGIN: http://localhost:8080
    ports:
      - "10000:10000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mychat
      POSTGRES_USER: mychat
      POSTGRES_PASSWORD: mychat
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
