services:
  - type: web
    name: mychat-v7
    runtime: node
    rootDir: .
    buildCommand: npm install --prefix backend
    startCommand: npm start --prefix backend
    healthCheckPath: /api/health
    plan: free
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_SSL
        value: true
      - key: ADMIN_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGIN
        value: "*"
