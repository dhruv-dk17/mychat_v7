databases:
  - name: mychat-db
    databaseName: mychat
    user: mychat_user
    plan: free

services:
  # 1. Backend Web Service (Node.js API)
  - type: web
    name: mychat-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /api/health
    plan: free
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: true
      - key: ADMIN_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: mychat-db
          property: connectionString
      - key: ALLOWED_ORIGIN
        # Tells the backend to strictly only allow requests from the frontend
        fromService:
          type: web
          name: mychat
          envVarKey: RENDER_EXTERNAL_URL

  # 2. Frontend Static Site
  - type: web
    name: mychat
    env: static
    rootDir: frontend
    # This automatically injects the backend's URL into config.js during the build!
    buildCommand: "sed -i \"s|return '/api';|return '${API_URL}/api';|g\" assets/js/config.js"
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    envVars:
      - key: API_URL
        # Grabs the backend URL dynamically
        fromService:
          type: web
          name: mychat-api
          envVarKey: RENDER_EXTERNAL_URL
